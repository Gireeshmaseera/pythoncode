<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Table Booking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        form {
            display: grid;
            gap: 10px;
            margin-bottom: 30px;
        }

        input, button {
            padding: 10px;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 10px;
        }
    </style>
</head>
<body>

<h1>Restaurant Table Booking</h1>

<form action="/book" method="post">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="text" name="phone" placeholder="Phone Number" required>
    <input type="date" name="date" required>
    <input type="time" name="time" required>
    <input type="number" name="guests" placeholder="Number of Guests" required>
    <button type="submit">Book Table</button>
</form>

<h2>Current Bookings</h2>

<table>
    <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Date</th>
        <th>Time</th>
        <th>Guests</th>
    </tr>

    {% for booking in bookings %}
    <tr>
        <td>{{ booking.name }}</td>
        <td>{{ booking.phone }}</td>
        <td>{{ booking.date }}</td>
        <td>{{ booking.time }}</td>
        <td>{{ booking.guests }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
